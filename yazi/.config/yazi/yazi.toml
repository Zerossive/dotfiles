[mgr]
show_hidden = true
ratio = [1, 2, 3]
linemode = 'size'
sort_by = 'natural'
image_delay = 200

[opener]
edit = [
	{ run = 'nvim ""%s""', desc = 'Neovim', block = true },
]
play = [
	{ run = 'xdg-open ""%s""', desc = 'Play', orphan = true },
]
open = [
	{ run = 'xdg-open ""%s""', desc = 'Open', orphan = true },
]
browser = [
  { run = 'flatpak run com.vivaldi.Vivaldi "%s"', desc = 'Browser', orphan = true },
]
svg = [
  { run = 'flatpak run org.inkscape.Inkscape "%s"', desc = 'Inkscape', orphan = true },
]
pdf = [
  { run = 'flatpak run com.github.jeromerobert.pdfarranger "%s"', desc = 'PDF Arranger', orphan = true },
]

[open]
prepend_rules = [
  { mime = 'image/svg+xml', use = [ 'open', 'reveal', 'svg' ] },
  { mime = 'text/*', use = [ 'edit', 'reveal', 'browser' ] },
  { mime = 'application/pdf', use = [ 'open', 'reveal', 'pdf' ] },
]

[preview]
max_width = 1920
max_height = 1080

[plugin]
  prepend_preloaders = [
    # Replace magick, image, video with mediainfo
    { mime = "{audio,video,image}/*", run = "mediainfo" },
    { mime = "application/subrip", run = "mediainfo" },
  ]
  prepend_previewers = [
    # Replace magick, image, video with mediainfo
    { mime = "{audio,video,image}/*", run = "mediainfo"},
    { mime = "application/subrip", run = "mediainfo" },
  ]
  # There are more extensions which are supported by mediainfo.
  # Just add file's MIME type to `previewers`, `preloaders` above.
  # https://mediaarea.net/en/MediaInfo/Support/Formats
